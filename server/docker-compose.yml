services:
  postgres_db:
    image: postgres:latest
    container_name: smartledger-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartledger
    ports:
      - "5432:5432"
    volumes:
      - smartledger_data:/var/lib/postgresql

